services:
  - type: web
    name: techblog-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        value: your_database_connection_string_here
      - key: CLIENT_URL
        value: https://techblogai.netlify.app/
